<html>
    <head>
        <title>CyberTech AI</title>
        <script src="https://kit.fontawesome.com/d03e87f9af.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous"/>
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="registration.css"/>
    </head>
    <body>
        <div class="bg-container">
            <div class="login-background">
                <div>
                    <div class="nav-image">
                        <img src="https://res.cloudinary.com/dem6q5g5c/image/upload/v1768930752/scan_logo_tbjdnf.png" class="image"/>
                    </div>
                    <h1 class="heading">Cyber Tech AI</h1>
                    <p class="paragraph">Security Scanning Dashboard</p>
                </div>
                <form class="main-form-container" id="formContainer">
                    <div class="form-container">
                        <label for="fullName">Full Name</label>
                        <input type="text" class="form-control form-input" placeholder="Enter your full name" id="fullName"/>
                    </div>
                    <div class="form-container">
                        <label for="DateOfBirth">Date Of Birth</label>
                        <input type="date" class="form-control form-input" placeholder="Enter your date of birth" id="DateOfBirth"/>
                    </div>
                    <div class="form-container">
                        <label for="userName">Username</label>
                        <input type="text" class="form-control form-input" placeholder="Enter your username" id="userName"/>
                    </div>
                    <div class="form-container" id="emailContainer">
                        <label for="email">Email</label>
                        <input type="email" class="form-control form-input" placeholder="Enter your email" id="email"/>
                    </div>
                    <div class="form-container">
                        <label for="password">Password</label>
                        <input type="password" class="form-control form-input" placeholder="Enter your password" id="password"/>
                    </div>
                    <div class="form-container">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" class="form-control form-input" placeholder="Re-Enter your password" id="confirmPassword"/>
                    </div>
                    <div class="form-container">
                        <button class="btn btn-primary w-100" id="registerButton" type="submit">Register</button>
                    </div>
                    <div class="bottom-container">
                        <p>Already have an account?<br/> <a href="main.html">Sign in</a></p>
                    </div>
                </form>
            </div>
        </div>
        <script src="registration.js"></script>
    </body>
</html>
